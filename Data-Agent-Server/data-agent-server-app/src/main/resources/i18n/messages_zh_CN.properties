# ==================== Agent Tool Prompts ====================
agent.tool_prompt.search_objects=当搜索空间仍然过宽时，先向用户确认最有价值的范围线索，或让 Explorer 继续并行发现候选对象。
agent.tool_prompt.get_object_detail=如果某个对象的 detail 获取失败，先判断这是否仍然阻塞任务，再决定是否在生成 SQL 之前继续补结构。
agent.tool_prompt.execute_select_sql=当范围已经可靠时，用它把流程从发现模式切换到回答整理，再判断用户是否需要图表或导出。
