server:
  port: 8081

spring:
  application:
    name: DataAgent
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/data_agent
    username: postgres
    password: postgres

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

sa-token:
  jwt-secret-key: DataAgent-secret-key
  timeout: 1800
  token-name: Authorization
  is-log: true
  is-concurrent: true
  is-share: false
  token-style: jwt
  is-write-header: true
  token-prefix: Bearer

auth:
  refresh-token:
    expire-seconds: 2592000     # 30 days
  oauth2:
    clients:
      google:
        client-id: ${GOOGLE_CLIENT_ID}
        client-secret: ${GOOGLE_CLIENT_SECRET}
        redirect-uri: ${GOOGLE_REDIRECT_URI}
      github:
        client-id: ${GITHUB_CLIENT_ID}
        client-secret: ${GITHUB_CLIENT_SECRET}
        redirect-uri: ${GITHUB_REDIRECT_URI}

# LangChain4j Configuration for Qwen (DashScope)
langchain4j:
  community:
    dashscope:
      chat-model:
        api-key: ${ALIYUN_AI_API_KEY:}
        base-url: https://coding.dashscope.aliyuncs.com/v1
        model-name: qwen3.5-plus
        parameters:
          enable-thinking: true
          thinking-budget: 1000
      streaming-chat-model:
        api-key: ${ALIYUN_AI_API_KEY:}
        base-url: https://coding.dashscope.aliyuncs.com/v1
        model-name: qwen3.5-plus
        parameters:
          enable-thinking: true
          thinking-budget: 1000
      embedding-model:
        api-key: ${ALIYUN_AI_API_KEY:}
        model-name: text-embedding-v4
        dimension: 1024

# Embedding 提供方配置（多模型接入时选择向量模型）
ai:
  embedding:
    provider: qwen   # qwen(千问) | zhipu(智谱)，默认 qwen
  zhipu:
    chat-model:
      api-key: ${zhipu_AI_API_KEY:}
      base-url: https://coding.dashscope.aliyuncs.com/v1
      model-name: glm-5
      parameters:
        temperature: 0.7
    streaming-chat-model:
      api-key: ${zhipu_AI_API_KEY:}
      base-url: https://coding.dashscope.aliyuncs.com/v1
      model-name: glm-5
      parameters:
        temperature: 0.7
    embedding-model:
      api-key: ${zhipu_AI_API_KEY:}
      base-url: https://coding.dashscope.aliyuncs.com/v1
      model-name: embedding-2
      dimension: 1024
  minimax:
    api-key: ${MiniMax_AI_API_KEY:}
    base-url: https://api.minimaxi.com/v1
    model-name: MiniMax-M2.5
    parameters:
      temperature: 0.7

# 全局通用线程池（发现、异步任务等共用）
app:
  executor:
    pool-size: 20

agent:
  observability:
    enabled: false
    runtime-log-enabled: false
    console-log-enabled: true
    sse-event-log-enabled: true
    model-event-log-enabled: true
    tool-event-log-enabled: true
    include-prompt: false
    include-response: true
    include-token-stream: true
    runtime-log-dir: ~/.data-agent/logs/agent/runtime
  sub-agent:
    explorer:
      timeout-seconds: 120
      dispatch:
        max-concurrency: 3
        queue-capacity: 9
    planner:
      timeout-seconds: 180
    max-explorer-loop: 3

memory:
  enabled: true
  embedding:
    dimension: 1024
  retrieval:
    preload-top-k: 6
    candidate-top-k: 10
    min-score: 0.72
